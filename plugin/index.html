<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindWeave 思维编织</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-container">
        <!-- 未登录状态 -->
        <div id="auth-container" class="card" style="display: none;">
            <div class="page-header" style="text-align: center; margin-bottom: 24px;">
                <h1><i class="ri-brain-line"></i> MindWeave 思维编织</h1>
                <p>思维导图即AI记忆结构</p>
            </div>

            <div class="auth-tabs">
                <button id="login-tab" class="btn btn-primary" style="flex:1;">登录</button>
                <button id="register-tab" class="btn btn-secondary" style="flex:1;">注册</button>
            </div>

            <div id="login-form" style="margin-top: 20px;">
                <input type="email" id="login-email" class="input" placeholder="请输入邮箱">
                <input type="password" id="login-password" class="input" placeholder="请输入密码">
                <button id="login-btn" class="btn btn-primary" style="width: 100%; margin-top: 12px;">登录</button>
            </div>

            <div id="register-form" style="margin-top: 20px; display: none;">
                <input type="email" id="register-email" class="input" placeholder="请输入邮箱">
                <input type="password" id="register-password" class="input" placeholder="请输入密码">
                <input type="password" id="register-password-confirm" class="input" placeholder="请确认密码">
                <button id="register-btn" class="btn btn-primary" style="width: 100%; margin-top: 12px;">注册</button>
            </div>
        </div>

        <!-- 已登录状态 -->
        <div id="main-container" style="display: none;">
            <div class="page-header">
                <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
                    <div>
                        <h1><i class="ri-brain-line"></i> MindWeave 思维编织</h1>
                        <p id="user-info">VIP会员 | 无限次使用</p>
                    </div>
                    <button id="logout-btn" class="btn btn-secondary">退出登录</button>
                </div>
            </div>

            <!-- 模板选择 -->
            <h3 class="template-title">选择思维导图模板</h3>
            <div class="template-grid">
                <div class="template-card active" data-template="tree">
                    <h3>树状图</h3>
                    <p>分类思维 | 知识梳理</p>
                </div>
                <div class="template-card" data-template="flow">
                    <h3>流程图</h3>
                    <p>步骤思维 | 流程拆解</p>
                </div>
                <div class="template-card" data-template="bubble">
                    <h3>气泡图</h3>
                    <p>发散思维 | 头脑风暴</p>
                </div>
                <div class="template-card" data-template="fishbone">
                    <h3>鱼骨图</h3>
                    <p>因果思维 | 问题分析</p>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="btn-group">
                <button id="blank-edit-btn" class="btn btn-primary">空白编辑</button>
                <button id="read-page-btn" class="btn btn-secondary">读取当前网页</button>
            </div>

            <div class="btn-group">
                <button id="my-maps-btn" class="btn btn-secondary" style="width: 100%;">我的导图</button>
            </div>

            <p class="tip" id="usage-tip">免费剩余次数：5/10</p>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
